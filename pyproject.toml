# RUFF

[tool.ruff]
line-length = 120
target-version = "py314"
unsafe-fixes = true

[tool.ruff.lint]
preview = true
select = [
    "ANN",  # type annotations
    "B",    # potential bugs
    "S",    # potential vulnerabilities
    "E",    # pycodestyle errors
    "I",    # sort imports
    "F",    # pyflakes errors
    "COM",  # commas
    "T2",   # print
    "DOC",  # docstring content
    "D",    # docstring
    "UP",   # update imports and code style according to python version
    "Q",    # quotes
    "C9",   # complexity
    "C4",   # comprehensions
    "FAST", # fastapi
]
fixable = ["ALL"]
ignore = [
    "D413",   # blank line after last docstring section
    "COM812", # missing trailing comma
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101"]

# MYPY

[tool.mypy]
plugins = ["pydantic.mypy", "sqlalchemy.ext.mypy.plugin"]
disallow_untyped_defs = true
disallow_any_generics = true
disallow_untyped_decorators = true

# VULTURE

[tool.vulture]
exclude = ['venv/']
